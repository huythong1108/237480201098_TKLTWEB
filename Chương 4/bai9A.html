<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var SoLuong, X;
        var DS = new Array(100);
        SoLuong = prompt("Bạn cần nhập bao nhiêu người: ", 5);
        for (i=0;i< SoLuong;i++){
            DS[i] = prompt("Nhập vào họ tên: ", "");
        }
        DS.sort();
        document.write("<h1>Danh sách đã sử sắp xếp là </h1>");
        for (x in DS){
            document.write(DS[x]);
            document.write("<BR>");
        }
    </script>
</body>
</html>
