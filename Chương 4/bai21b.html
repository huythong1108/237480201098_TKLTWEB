<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
function Tinh(){
var a = parseFloat(document.getElementById("a").value);
var b = parseFloat(document.getElementById("b").value);
var op = document.querySelector('input[name="pt"]:checked').value;
var kq;

if(op=="+") kq=a+b;
if(op=="-") kq=a-b;
if(op=="*") kq=a*b;
if(op=="/") kq=a/b;

document.getElementById("kq").value=kq;
}
</script>
</head>

<body>

Số 1<input id="a"><br>
Số 2 <input id="b"><br>

<input type="radio" name="pt" value="+">+
<input type="radio" name="pt" value="-">-
<input type="radio" name="pt" value="*">*
<input type="radio" name="pt" value="/">/<br><br>

<button onclick="Tinh()">Tính</button><br><br>

Kết quả: <input id="kq">

</body>
</body>
</html>
