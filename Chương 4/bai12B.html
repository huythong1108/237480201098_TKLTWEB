<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Hãy gõ văn bản vào trong hộp thoại text và click vào nút
    Hiển thị</h2>
    <form action="">
        <label for="" style="width: 70px;display: inline-block;">Họ tên:</label>
        <input type="text" id="HoTen"><br>
        <label for="" style="width: 70px;display: inline-block;">Năm sinh:</label>
        <input type="text" id="NamSinh"><br>
        <input type="button" name="HienThi" value="Hiển thị"
        onclick="alert('Họ tên: ' + HoTen.value +'\nNăm sinh: ' + NamSinh.value)">
    </form>
</body>
</html>
