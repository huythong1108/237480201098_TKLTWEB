<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
function Cong(){
kq.value = parseFloat(a.value) + parseFloat(b.value);
}
function Tru(){
kq.value = a.value - b.value;
}
function Nhan(){
kq.value = a.value * b.value;
}
function Chia(){
kq.value = a.value / b.value;
}
</script>
</head>

<body>

Số 1 <input id="a"><br>
Số 2 <input id="b"><br>
Kết quả <input id="kq"><br><br>

<button onclick="Cong()">+</button>
<button onclick="Tru()">-</button>
<button onclick="Nhan()">*</button>
<button onclick="Chia()">/</button>

</body>
</body>
</html>
