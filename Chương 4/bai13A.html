<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function Tong(){
            let a = parseFloat(document.getElementById("Sohang1").value);
            let b = parseFloat(document.getElementById("Sohang2").value);
            if (isNaN(a) || isNaN(b)) {
                alert("Vui lòng nhập số hợp lệ!");
                return;}
            document.getElementById("KetQua").value = a + b;
        }
    </script>
</head>
<body>
    <h2>Hãy nhập hai số và click vào nút Tính Tổng</h2>
    <input type="text" id="Sohang1"> +
    <input type="text" id="Sohang2"> =
    <input type="text" id="KetQua">
    <input type="button" value="Tính Tổng" onclick="Tong()">
</body>
</html>
