<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Thay đổi màu nền sử dụng đối tượng document</h2>
    <input type="button" name="ThayMauNen" value="Nền Xanh Dương"
    onclick="document.bgColor = 'blue'">
    <input type="button" name="ThayMauNen" value="Nền Xanh Lá"
    onclick="document.bgColor = 'green'">
    <input type="button" name="ThayMauNen" value="Nền Vàng"
    onclick="document.bgColor = 'yellow'">
</body>
</html>
