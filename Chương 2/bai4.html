<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký dự thi</title>
</head>
<body>
    <table width ="100%">
        <tr>
            <td align = "center"><b>TRƯỜNG ĐẠI HỌC BẠC LIÊU </b><br>
                KHOA KỸ THUẬT VÀ CÔNG NGHỆ
            </td>
            <td align = "center"><b>CỘNG HOÀ XÃ HỘI CHỦ NGHĨA VIỆT NAM</b><br>
                Độc lập - Tự do - Hạnh phúc
            </td>
        </tr>
    </table>
    <h1 style="text-align: center;font-family: Verdana;color: red;">
        <b>ĐĂNG KÝ XÉT TUYỂN</b>
    </h1><br>

    <div style="width: 300px;margin:auto;;">
        <form action="" style="font-size: 15pt;margin-top: 40px;line-height: 30px;">
            <label >Họ tên:</label>
            <input type="text"><br>
            <label >Giới tính:</label>
            
            <input type="radio" name="GioiTinh">
            <label >Nam</label>
            <input type="radio" name="GioiTinh">
            <label >Nữ</label><br>
            
            <label >Ngảnh thi: </label><br>
            <div style="margin-left: 30px;">
                <input type="radio" name="Nganh">
                <label >Công nghệ thông tin</label><br>
                <input type="radio" name="Nganh">
                <label >Mầm non</label><br>
                <input type="radio" name="Nganh">
                <label >Âm nhạc</label><br>
            </div>

            <input type="button" value="Đồng ý" style="width: 100px;">
            <input type="button" value="Không đồng ý" style="width: 120px;">
    </div>
</body>
</html>
